<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="OAP Verified Conformance Seal">
  <title>Open Agent Protocol Verified</title>
  <desc>Tamper evident conformance seal. The seal is visual only. Verification is performed against the signed Conformance Receipt referenced by the implementation manifest.</desc>

  <defs>
    <linearGradient id="sealStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="sealRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    <radialGradient id="sealCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#312E81" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="sealGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <path id="sealTopArc"    d="M 70 256 A 186 186 0 0 1 442 256" fill="none"/>
    <path id="sealBottomArc" d="M 70 256 A 186 186 0 0 0 442 256" fill="none"/>
  </defs>

  <circle cx="256" cy="256" r="248" fill="url(#sealRing)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#sealStroke)" stroke-width="2" opacity="0.55"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#sealStroke)" stroke-width="0.75" opacity="0.4"/>

  <g stroke="url(#sealStroke)" stroke-width="0.5" opacity="0.28" fill="none">
    <circle cx="256" cy="256" r="220"/>
    <circle cx="256" cy="256" r="214"/>
    <circle cx="256" cy="256" r="208"/>
    <circle cx="256" cy="256" r="202"/>
  </g>

  <g stroke="url(#sealStroke)" stroke-width="0.6" opacity="0.18">
    <line x1="256" y1="44"  x2="256" y2="64"/>
    <line x1="256" y1="448" x2="256" y2="468"/>
    <line x1="44"  y1="256" x2="64"  y2="256"/>
    <line x1="448" y1="256" x2="468" y2="256"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-weight="600" font-size="14" letter-spacing="6" fill="#E0E7FF">
    <text>
      <textPath href="#sealTopArc" startOffset="50%" text-anchor="middle">OPEN AGENT PROTOCOL · VERIFIED</textPath>
    </text>
    <text font-size="11" letter-spacing="5" fill="#A5B4FC">
      <textPath href="#sealBottomArc" startOffset="50%" text-anchor="middle">CONFORMANCE RECEIPT · ED25519 · DID BOUND</textPath>
    </text>
  </g>

  <g transform="translate(256 256)">
    <g stroke="url(#sealStroke)" stroke-width="0.6" opacity="0.45">
      <g id="rays">
        <line x1="0" y1="-188" x2="0" y2="-148"/>
      </g>
      <use href="#rays" transform="rotate(15)"/>
      <use href="#rays" transform="rotate(30)"/>
      <use href="#rays" transform="rotate(45)"/>
      <use href="#rays" transform="rotate(60)"/>
      <use href="#rays" transform="rotate(75)"/>
      <use href="#rays" transform="rotate(90)"/>
      <use href="#rays" transform="rotate(105)"/>
      <use href="#rays" transform="rotate(120)"/>
      <use href="#rays" transform="rotate(135)"/>
      <use href="#rays" transform="rotate(150)"/>
      <use href="#rays" transform="rotate(165)"/>
      <use href="#rays" transform="rotate(180)"/>
      <use href="#rays" transform="rotate(195)"/>
      <use href="#rays" transform="rotate(210)"/>
      <use href="#rays" transform="rotate(225)"/>
      <use href="#rays" transform="rotate(240)"/>
      <use href="#rays" transform="rotate(255)"/>
      <use href="#rays" transform="rotate(270)"/>
      <use href="#rays" transform="rotate(285)"/>
      <use href="#rays" transform="rotate(300)"/>
      <use href="#rays" transform="rotate(315)"/>
      <use href="#rays" transform="rotate(330)"/>
      <use href="#rays" transform="rotate(345)"/>
    </g>
  </g>

  <circle cx="256" cy="256" r="148" fill="url(#sealCore)"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#sealStroke)" stroke-width="1.25" opacity="0.7"/>

  <g transform="translate(256 256)">
    <circle r="92" fill="none" stroke="url(#sealStroke)" stroke-width="9" stroke-linecap="round" filter="url(#sealGlow)"/>
    <circle r="58" fill="none" stroke="url(#sealStroke)" stroke-width="2" stroke-dasharray="2 6" opacity="0.7"/>
    <g fill="url(#sealStroke)">
      <circle cx="0"     cy="-92" r="6.5"/>
      <circle cx="79.7"  cy="46"  r="6.5"/>
      <circle cx="-79.7" cy="46"  r="6.5"/>
    </g>
    <g stroke="url(#sealStroke)" stroke-width="0.9" opacity="0.5">
      <line x1="0"     y1="-92" x2="79.7"  y2="46"/>
      <line x1="79.7"  y1="46"  x2="-79.7" y2="46"/>
      <line x1="-79.7" y1="46"  x2="0"     y2="-92"/>
    </g>
    <circle r="7" fill="#FFFFFF"/>
  </g>

  <g transform="translate(256 372)" text-anchor="middle">
    <rect x="-44" y="-14" width="88" height="28" rx="6" fill="#0A0A0B" stroke="url(#sealStroke)" stroke-width="1"/>
    <text id="sealLevel" y="6" font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif" font-weight="800" font-size="16" letter-spacing="3" fill="#FFFFFF">L5 · CERTIFIED</text>
  </g>

  <g transform="translate(256 412)" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text id="sealFingerprint" font-size="10" letter-spacing="2" fill="#A5B4FC">FP · 3F2A91 · 4C7B0E</text>
  </g>
</svg>
